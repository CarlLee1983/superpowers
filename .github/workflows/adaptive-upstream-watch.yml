name: Adaptive upstream watch

on:
  schedule:
    - cron: '23 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream tags
        run: |
          git remote add upstream https://github.com/obra/superpowers.git
          git fetch upstream --tags --force

      - name: Report newest stable upstream release
        shell: bash
        run: |
          set -euo pipefail
          current="$(jq -r '.tag' .adaptive-base.json)"
          latest="$({ git tag --list 'v[0-9]*' --sort=-v:refname || true; } | awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/ { print; exit }')"
          if [[ -z "$latest" ]]; then
            printf 'No stable upstream tag was found.\n' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          if [[ "$current" == "$latest" ]]; then
            printf 'Adaptive already uses `%s`.\n' "$current" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          scripts/report-upstream-changes.py --target-ref "$latest" > upstream-report.md
          cat upstream-report.md >> "$GITHUB_STEP_SUMMARY"
